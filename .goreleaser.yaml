version: 2

project_name: kuma

builds:
  - id: kuma
    main: ./cmd/kuma
    binary: kuma
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: binaries
    ids:
      - kuma
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

brews:
  - name: kuma
    ids:
      - binaries
    repository:
      owner: folsomintel
      name: homebrew-kuma
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/folsomintel/kuma
    description: CLI for controlling kuma daemons, remotes, and agent sessions
    license: Apache-2.0
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for kuma {{ .Tag }}"
    test: |
      system "#{bin}/kuma", "-V"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ## Install

    ```bash
    brew install folsomintel/kuma/kuma
    ```

    ## Downloads

    | Asset | Platform |
    | --- | --- |
    | `kuma` | Linux / macOS (amd64, arm64) |
