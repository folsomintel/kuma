version: 2

project_name: kuma

builds:
  - id: kuma
    main: ./cmd/kuma
    binary: kuma
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: binaries
    ids:
      - kuma
    formats:
      - binary
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  footer: |
    ## Downloads

    | Asset | Platform |
    | --- | --- |
    | `kuma` | Linux / macOS (amd64, arm64) |
